name: together
description: A private, fast, and secure messaging and WebRTC calling app for exactly two partners.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_webrtc: ^1.4.1
  shared_preferences: ^2.5.3
  http: ^1.6.0
  intl: ^0.20.2
  provider: ^6.1.5
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
